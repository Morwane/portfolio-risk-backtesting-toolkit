# Universe configuration for Portfolio Risk Backtesting Toolkit
# Each sleeve defines the preferred LSEG RIC, a fallback RIC, the price field,
# and metadata used throughout the toolkit.
#
# LSEG FIELD NOTES:
#   TR.PriceClose  -> Refinitiv Data API (refinitiv.data / lseg.data)
#   CF_CLOSE       -> Eikon Python API fallback
#   Both return adjusted close price. Total return (TR.TotalReturn) requires
#   premium entitlement and is used only if explicitly available.
#
# ENTITLEMENT WARNING:
#   Exchange-suffixed RICs (e.g. IGLT.L, IBGE.AS) require exchange data
#   entitlements. If unavailable, the fallback RIC is used.

base_currency: "USD"
default_start_date: "2004-01-01"
default_end_date: null  # null resolves to today at runtime

