      embedded in returns relative to USD base portfolio. UCITS product;
      not a US-listed ETF. Fallback: IS04.DE (iShares $ Treasury Bond 7-10yr
      UCITS ETF, Xetra, EUR), LIVE-confirmed: 2015-01-26 to 2026-04-23.
      All US-listed alternatives confirmed inaccessible: IEF, VGIT, ITE, IEI,
      SCHR, GOVT, TLT, SCHZ. UK/NL-listed UCITS also inaccessible: IBTM.L,
      IBTM.AS, SXRL.L, VUST.L, IBTM. VDTY.L works (2016-02-25) but has
      shorter history than SXRL.DE and was not promoted.

