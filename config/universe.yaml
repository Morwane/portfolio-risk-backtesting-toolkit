    fallback_field: "CF_CLOSE"
    currency: "USD"
    asset_class: "Sovereign Bond"
    sub_class: "US Rates Short"
    inception_date: "2007-04-10"
    notes: >
      Vanguard Short-Term Bond ETF (BSV). IMPORTANT: BSV is not a pure 1-3Y
      Treasury ETF — it holds ~65% government (Treasuries + agencies) and ~35%
      investment-grade corporate bonds, duration ~2.8 years. It is a compromise
      proxy; the original SHY (pure 1-3Y Treasury) is unavailable under current
      LSEG entitlement as is VGSH. BSV verified working via discover_candidates.py;
      inception 2007-04-10. NO INDEPENDENT FALLBACK: all other tested candidates
      (SHY, VGSH, SCHO, IEI, SCHR, FLOT, SPTS) failed in LIVE testing.
      fallback_ric is set to BSV (same as primary) to signal this explicitly.
      Sleeve performance will reflect minor IG credit spread sensitivity not
      present in a pure treasury sleeve.

