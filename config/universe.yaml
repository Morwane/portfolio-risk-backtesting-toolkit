    inception_date: "2004-01-26"
    notes: >
      Vanguard Information Technology ETF (VGT). Verified working under current
      LSEG entitlement via validate_universe.py. QQQ (Invesco Nasdaq-100) set as
      fallback — QQQ returns 0 rows under this entitlement. VGT inception 2004-01-26;
