    primary_field: "TR.PriceClose"
    fallback_field: "CF_CLOSE"
    currency: "USD"
    asset_class: "Equity"
    sub_class: "US Equity"
    inception_date: "1993-01-29"
    notes: "SPDR S&P 500 ETF Trust. Most liquid US large cap proxy."

  - id: "us_tech"
    name: "US Tech / Growth"
    primary_ric: "VGT"
