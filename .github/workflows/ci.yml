name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: pytest --cov=src --cov-report=term-missing -q

  demo-pipeline:
    name: Demo pipeline smoke test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate demo data
        run: python data/sample/generate_demo_data.py

      - name: Run demo backtest (all portfolios)
        run: python scripts/run_backtest.py --demo --portfolio all

      - name: Verify expected outputs exist
        run: |
          test -f outputs/tables/portfolio_summary.csv
          test -f outputs/tables/drawdown_table.csv
          test -f outputs/tables/var_es_summary.csv
          test -f outputs/charts/cumulative_performance.png
          test -f outputs/charts/drawdown.png
          test -f outputs/run_manifest.json
          test -f outputs/tearsheet.md
          echo "All expected outputs present."
